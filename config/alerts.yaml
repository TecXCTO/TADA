# Alert Configuration Registry (config/alerts.yaml)This configuration file isolates your communication variables. It allows you to toggle automated emails and choose destinations without touching script logic.


email_alerts:
  enabled: true
  smtp_server: "://gmail.com"
  smtp_port: 587
  sender_email: "your_automation_system@gmail.com"
  sender_password: "YOUR_APP_PASSWORD" # Use an App Password, not your raw master password
  recipient_email: "engineering_manager@yourfirm.com"
  
